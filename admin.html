<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Locate Me</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #475569; }
  .header h1 { color: #fbbf24; font-size: 24px; }
  .back-btn { background: #334155; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .stat-card { background: #334155; padding: 20px; border-radius: 12px; }
  .stat-card h3 { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
  .stat-card .number { font-size: 32px; font-weight: 700; color: #fbbf24; }
  .users-section { background: #334155; border-radius: 12px; padding: 20px; }
  .users-section h2 { margin-bottom: 20px; color: #fbbf24; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #475569; }
  th { color: #94a3b8; font-size: 12px; text-transform: uppercase; }
  td { font-size: 14px; }
  .role-badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .role-admin { background: #fbbf24; color: #0f172a; }
  .role-user { background: #475569; color: #f8fafc; }
  .loading { text-align: center; padding: 40px; color: #94a3b8; }
  .error { color: #ef4444; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ Admin Dashboard</h1>
  <a href="index.html" class="back-btn">← Back to App</a>
</div>

<div class="stats">
  <div class="stat-card">
    <h3>Total Registered Users</h3>
    <div class="number" id="totalUsers">0</div>
  </div>
  <div class="stat-card">
    <h3>Admins</h3>
    <div class="number" id="totalAdmins">0</div>
  </div>
</div>

<div class="users-section">
  <h2>Registered Users</h2>
  <div id="usersContainer">
    <div class="loading">Loading users...</div>
  </div>
</div>

<script>
const API_URL = 'https://locate-me-backend-yvs8.onrender.com/api';

// 🛡️ ADMIN SECURITY GUARD
(function checkAdminAccess() {
    const token = localStorage.getItem('authToken');
    const userStr = localStorage.getItem('user');

    if (!token || !userStr) {
        window.location.href = 'index.html';
        return;
    }

    try {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
            alert('🚫 Access Denied: This area is for Administrators only.');
            window.location.href = 'index.html';
        }
    } catch (e) {
        window.location.href = 'index.html';
    }
})();

// ✅ FETCH AND DISPLAY USERS
async function loadAdminUsers() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('usersContainer');

    try {
        const res = await fetch(`${API_URL}/admin/users`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
            if (res.status === 403) throw new Error('Access Denied. Please log in as admin.');
            throw new Error('Failed to load users');
        }

        const users = await res.json();
        
        // Update stats
        document.getElementById('totalUsers').textContent = users.length;
        const adminCount = users.filter(u => u.role === 'admin').length;
        document.getElementById('totalAdmins').textContent = adminCount;

        // Render table
        if (users.length === 0) {
            container.innerHTML = '<div class="loading">No users found.</div>';
            return;
        }

        let tableHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Verified</th>
                        <th>Joined</th>
                    </tr>
                </thead>
                <tbody>
        `;

        users.forEach(user => {
            const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
            const verifiedText = user.is_verified ? '✅ Yes' : ' No';
            const joinDate = new Date(user.created_at).toLocaleDateString();
            
            tableHTML += `
                <tr>
                    <td>${user.email}</td>
                    <td><span class="role-badge ${roleClass}">${user.role}</span></td>
                    <td>${verifiedText}</td>
                    <td>${joinDate}</td>
                </tr>
            `;
        });

        tableHTML += `</tbody></table>`;
        container.innerHTML = tableHTML;

    } catch (err) {
        console.error('Admin load error:', err);
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

// Load users when page opens
loadAdminUsers();
</script>

</body>
</html>
