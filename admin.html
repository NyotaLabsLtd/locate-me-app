<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Locate Me</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb; --danger: #ef4444; --success: #059669;
  --warning: #fbbf24; --dark: #0f172a; --dark-card: #334155;
  --light: #f8fafc; --gray: #94a3b8; --border: #475569;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: var(--light); padding: 20px; min-height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.header h1 { color: var(--warning); font-size: 24px; display: flex; align-items: center; gap: 10px; }
.back-btn { background: var(--dark-card); color: var(--light); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; border: 1px solid var(--border); }
.back-btn:hover { background: var(--border); }

.tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
.tab { padding: 12px 24px; background: none; border: none; color: var(--gray); cursor: pointer; font-size: 16px; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.tab.active { color: var(--warning); border-bottom-color: var(--warning); }
.tab:hover { color: var(--light); }

.section { display: none; }
.section.active { display: block; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--dark-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
.stat-card h3 { color: var(--gray); font-size: 14px; margin-bottom: 10px; }
.stat-card .number { font-size: 32px; font-weight: 700; color: var(--warning); }

.content-card { background: var(--dark-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
.content-card h2 { margin-bottom: 20px; color: var(--warning); font-size: 20px; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--gray); font-size: 12px; text-transform: uppercase; font-weight: 600; }
td { font-size: 14px; }
tr:hover { background: rgba(251, 191, 36, 0.05); }

.role-badge, .status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; display: inline-block; }
.role-admin { background: var(--warning); color: var(--dark); }
.role-user { background: var(--gray); color: var(--dark); }
.status-verified { color: var(--success); }
.status-unverified { color: var(--gray); }

.phone-number { font-family: monospace; background: var(--dark); padding: 4px 8px; border-radius: 4px; font-size: 13px; }
.loading { text-align: center; padding: 40px; color: var(--gray); }
.error { color: var(--danger); text-align: center; padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; }
.empty-state { text-align: center; padding: 40px; color: var(--gray); }

@media (max-width: 768px) {
  .header { flex-direction: column; gap: 15px; align-items: flex-start; }
  table { font-size: 12px; }
  th, td { padding: 8px; }
  .tabs { overflow-x: auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ Admin Dashboard</h1>
  <a href="index.html" class="back-btn">← Back to App</a>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('users')">👥 Users</button>
  <button class="tab" onclick="switchTab('missing')">📋 Missing Persons</button>
  <button class="tab" onclick="switchTab('found')">🔍 Found/Sightings</button>
</div>

<!-- USERS SECTION -->
<div id="usersSection" class="section active">
  <div class="stats">
    <div class="stat-card">
      <h3>Total Users</h3>
      <div class="number" id="totalUsers">0</div>
    </div>
    <div class="stat-card">
      <h3>Admins</h3>
      <div class="number" id="totalAdmins">0</div>
    </div>
    <div class="stat-card">
      <h3>Verified</h3>
      <div class="number" id="verifiedUsers">0</div>
    </div>
  </div>
  
  <div class="content-card">
    <h2>Registered Users</h2>
    <div id="usersContainer"><div class="loading">Loading users...</div></div>
  </div>
</div>

<!-- MISSING PERSONS SECTION -->
<div id="missingSection" class="section">
  <div class="stats">
    <div class="stat-card">
      <h3>Total Missing Posts</h3>
      <div class="number" id="totalMissing">0</div>
    </div>
  </div>
  
  <div class="content-card">
    <h2>Missing Persons Reports</h2>
    <div id="missingContainer"><div class="loading">Loading posts...</div></div>
  </div>
</div>

<!-- FOUND/SIGHTINGS SECTION -->
<div id="foundSection" class="section">
  <div class="stats">
    <div class="stat-card">
      <h3>Total Sightings</h3>
      <div class="number" id="totalSightings">0</div>
    </div>
  </div>
  
  <div class="content-card">
    <h2>Found/Sighting Reports</h2>
    <div id="foundContainer"><div class="loading">Loading sightings...</div></div>
  </div>
</div>

<script>
const API_URL = 'https://locate-me-backend-yvs8.onrender.com/api';

// 🛡️ ADMIN SECURITY GUARD
(function checkAdminAccess() {
    const token = localStorage.getItem('authToken');
    const userStr = localStorage.getItem('user');
    if (!token || !userStr) { window.location.href = 'index.html'; return; }
    try {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
            alert('🚫 Access Denied: Admins only');
            window.location.href = 'index.html';
        }
    } catch (e) { window.location.href = 'index.html'; }
})();

// Tab Switching
function switchTab(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tabName + 'Section').classList.add('active');
}

// Load Users
async function loadUsers() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('usersContainer');
    try {
        const res = await fetch(`${API_URL}/admin/users`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load users');
        const users = await res.json();
        
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalAdmins').textContent = users.filter(u => u.role === 'admin').length;
        document.getElementById('verifiedUsers').textContent = users.filter(u => u.is_verified).length;
        
        if (users.length === 0) {
            container.innerHTML = '<div class="empty-state">No users found</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Email</th><th>Role</th><th>Verified</th><th>Joined</th></tr></thead><tbody>`;
        users.forEach(user => {
            const verifiedBadge = user.is_verified ? '<span class="status-verified">✅ Yes</span>' : '<span class="status-unverified">❌ No</span>';
            const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
            const joinDate = new Date(user.created_at).toLocaleDateString('en-KE');
            html += `<tr><td>${user.email}</td><td><span class="role-badge ${roleClass}">${user.role}</span></td><td>${verifiedBadge}</td><td>${joinDate}</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

// Load Missing Persons
async function loadMissingPersons() {
    const container = document.getElementById('missingContainer');
    try {
        const res = await fetch(`${API_URL}/missing-persons`);
        if (!res.ok) throw new Error('Failed to load posts');
        const posts = await res.json();
        
        document.getElementById('totalMissing').textContent = posts.length;
        
        if (posts.length === 0) {
            container.innerHTML = '<div class="empty-state">No missing person reports</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Name</th><th>Age</th><th>Gender</th><th>Last Seen</th><th>Date Posted</th></tr></thead><tbody>`;
        posts.forEach(post => {
            const date = new Date(post.date_missing).toLocaleDateString('en-KE');
            html += `<tr><td>${post.name}</td><td>${post.age || 'N/A'}</td><td>${post.gender || 'N/A'}</td><td>${post.last_seen_location}</td><td>${date}</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

// Load Sightings (Found)
async function loadSightings() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('foundContainer');
    try {
        const res = await fetch(`${API_URL}/sightings`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to load sightings');
        const sightings = await res.json();
        
        document.getElementById('totalSightings').textContent = sightings.length;
        
        if (sightings.length === 0) {
            container.innerHTML = '<div class="empty-state">No sighting reports</div>';
            return;
        }
        
        let html = `<table><thead><tr><th>Person Name</th><th>Location</th><th>Time</th><th>Reporter Contact</th><th>Date</th></tr></thead><tbody>`;
        sightings.forEach(s => {
            const date = new Date(s.created_at).toLocaleDateString('en-KE');
            const phone = s.reporter_contact || 'N/A';
            html += `<tr><td>${s.missing_person_name || 'Unknown'}</td><td>${s.sighting_location}</td><td>${s.sighting_time || 'N/A'}</td><td><span class="phone-number">📞 ${phone}</span></td><td>${date}</td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) {
        container.innerHTML = `<div class="error">❌ ${err.message}</div>`;
    }
}

// Initialize
window.addEventListener('load', () => {
    loadUsers();
    loadMissingPersons();
    loadSightings();
});
</script>

</body>
</html>
