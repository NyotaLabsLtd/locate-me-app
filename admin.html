<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Locate Me</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #2563eb; --danger: #ef4444; --success: #059669;
  --warning: #fbbf24; --dark: #0f172a; --dark-card: #1e293b;
  --light: #f8fafc; --gray: #94a3b8; --border: #334155;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: var(--light); padding: 20px; min-height: 100vh; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.header h1 { color: var(--warning); font-size: 24px; display: flex; align-items: center; gap: 10px; }
.back-btn { background: var(--dark-card); color: var(--light); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; border: 1px solid var(--border); }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); overflow-x: auto; }
.tab { padding: 12px 24px; background: none; border: none; color: var(--gray); cursor: pointer; font-size: 16px; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; }
.tab.active { color: var(--warning); border-bottom-color: var(--warning); }
.section { display: none; }
.section.active { display: block; }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--dark-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
.stat-card h3 { color: var(--gray); font-size: 14px; margin-bottom: 10px; }
.stat-card .number { font-size: 32px; font-weight: 700; color: var(--warning); }
.content-card { background: var(--dark-card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 900px; }
th, td { padding: 15px 12px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: middle; }
th { color: var(--warning); font-size: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; background: rgba(15, 23, 42, 0.5); }
td { font-size: 14px; color: var(--light); }
tr:hover td { background: rgba(251, 191, 36, 0.05); }
.role-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.role-admin { background: var(--warning); color: var(--dark); }
.role-user { background: var(--gray); color: var(--dark); }
.phone-number, .email-link { font-family: monospace; background: var(--dark); padding: 6px 10px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); display: inline-block; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.email-link { color: var(--warning); text-decoration: none; }
.email-link:hover { text-decoration: underline; }
.thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid var(--border); transition: transform 0.2s, border-color 0.2s; }
.thumb-img:hover { transform: scale(1.1); border-color: var(--warning); }
.no-photo { width: 60px; height: 60px; background: var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--gray); font-size: 24px; }
.btn-delete { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
.btn-delete:hover { background: #dc2626; }
.img-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
.img-modal-content { max-width: 95%; max-height: 95%; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
.close-modal { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; font-weight: bold; }
.loading { text-align: center; padding: 40px; color: var(--gray); }
.error { color: var(--danger); text-align: center; padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; }
@media (max-width: 768px) {
  .header { flex-direction: column; gap: 15px; align-items: flex-start; }
  th, td { padding: 10px 8px; font-size: 12px; }
  th { font-size: 12px; }
  table { min-width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🛡️ Admin Dashboard</h1>
  <a href="index.html" class="back-btn">← Back to App</a>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('users', event)">👥 Users</button>
  <button class="tab" onclick="switchTab('missing', event)">📋 Missing Persons</button>
  <button class="tab" onclick="switchTab('found', event)">🔍 Found/Sightings</button>
</div>

<!-- USERS SECTION -->
<div id="usersSection" class="section active">
  <div class="stats">
    <div class="stat-card"><h3>Total Users</h3><div class="number" id="totalUsers">0</div></div>
    <div class="stat-card"><h3>Admins</h3><div class="number" id="totalAdmins">0</div></div>
    <div class="stat-card"><h3>Verified</h3><div class="number" id="verifiedUsers">0</div></div>
  </div>
  <div class="content-card">
    <h2 style="color: var(--warning); margin-bottom: 20px;">Registered Users</h2>
    <div id="usersContainer"><div class="loading">Loading users...</div></div>
  </div>
</div>

<!-- MISSING PERSONS SECTION -->
<div id="missingSection" class="section">
  <div class="stats">
    <div class="stat-card"><h3>Total Missing Posts</h3><div class="number" id="totalMissing">0</div></div>
  </div>
  <div class="content-card">
    <h2 style="color: var(--warning); margin-bottom: 20px;">Missing Persons Reports</h2>
    <div id="missingContainer"><div class="loading">Loading posts...</div></div>
  </div>
</div>

<!-- FOUND/SIGHTINGS SECTION -->
<div id="foundSection" class="section">
  <div class="stats">
    <div class="stat-card"><h3>Total Sightings</h3><div class="number" id="totalSightings">0</div></div>
  </div>
  <div class="content-card">
    <h2 style="color: var(--warning); margin-bottom: 20px;">Found/Sighting Reports</h2>
    <div id="foundContainer"><div class="loading">Loading sightings...</div></div>
  </div>
</div>

<!-- Image Modal -->
<div id="imageModal" class="img-modal" onclick="closeImageModal()">
  <span class="close-modal">&times;</span>
  <img class="img-modal-content" id="modalImg">
</div>

<script>
const API_URL = 'https://locate-me-backend-yvs8.onrender.com/api';

// ️ ADMIN SECURITY GUARD
(function checkAdminAccess() {
    const token = localStorage.getItem('authToken');
    const userStr = localStorage.getItem('user');
    if (!token || !userStr) { window.location.href = 'index.html'; return; }
    try {
        const user = JSON.parse(userStr);
        if (user.role !== 'admin') {
            alert('🚫 Access Denied: Admins only');
            window.location.href = 'index.html';
        }
    } catch (e) { window.location.href = 'index.html'; }
})();

function switchTab(tabName, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tabName + 'Section').classList.add('active');
}

function openImageModal(src) {
    if (!src) return;
    document.getElementById('modalImg').src = src;
    document.getElementById('imageModal').style.display = 'flex';
}
function closeImageModal() {
    document.getElementById('imageModal').style.display = 'none';
}

// Load Users
async function loadUsers() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('usersContainer');
    try {
        const res = await fetch(`${API_URL}/admin/users`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) throw new Error('Failed to load users');
        const users = await res.json();
        
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('totalAdmins').textContent = users.filter(u => u.role === 'admin').length;
        document.getElementById('verifiedUsers').textContent = users.filter(u => u.is_verified).length;
        
        if (users.length === 0) { container.innerHTML = '<div class="loading">No users found</div>'; return; }
        
        // Added "Action" column header
        let html = `<table><thead><tr><th>Email</th><th>Role</th><th>Verified</th><th>Joined</th><th>Action</th></tr></thead><tbody>`;
        users.forEach(user => {
            const verifiedBadge = user.is_verified ? '<span style="color: var(--success); font-weight: bold;">✅ Yes</span>' : '<span style="color: var(--gray);">❌ No</span>';
            const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
            const joinDate = new Date(user.created_at).toLocaleDateString('en-KE');
            // Added Delete button for each user
            html += `<tr><td>${user.email}</td><td><span class="role-badge ${roleClass}">${user.role}</span></td><td>${verifiedBadge}</td><td>${joinDate}</td><td><button class="btn-delete" onclick="deleteUser('${user.id}', '${user.email}')">Delete User</button></td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) { container.innerHTML = `<div class="error">❌ ${err.message}</div>`; }
}

// ✅ NEW: Delete User Function
async function deleteUser(id, email) {
    if (!confirm(`Are you sure you want to permanently delete the user "${email}"? This cannot be undone.`)) return;
    
    const token = localStorage.getItem('authToken');
    try {
        const res = await fetch(`${API_URL}/admin/users/${id}`, {
            method: 'DELETE',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        if (!res.ok) throw new Error('Failed to delete user');
        alert('✅ User deleted successfully');
        loadUsers(); // Reload the list
    } catch (err) {
        alert('❌ Failed to delete: ' + err.message);
    }
}

// Load Missing Persons
async function loadMissingPersons() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('missingContainer');
    try {
        const res = await fetch(`${API_URL}/admin/missing-persons`, { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        if (!res.ok) throw new Error('Failed to load posts');
        const posts = await res.json();
        
        document.getElementById('totalMissing').textContent = posts.length;
        
        if (posts.length === 0) { container.innerHTML = '<div class="loading">No missing person reports</div>'; return; }
        
        let html = `<table><thead><tr><th>Photo</th><th>Name</th><th>Age</th><th>Gender</th><th>Last Seen</th><th>Posted By</th><th>Date</th><th>Action</th></tr></thead><tbody>`;
        posts.forEach(post => {
            const photoUrl = post.photo_urls && post.photo_urls.length > 0 ? post.photo_urls[0] : null;
            const imgHtml = photoUrl 
                ? `<img src="${photoUrl}" class="thumb-img" onclick="openImageModal('${photoUrl}')" alt="${post.name}">` 
                : `<div class="no-photo">📷</div>`;
            const date = new Date(post.date_missing).toLocaleDateString('en-KE');
            const posterEmail = post.poster_email || 'Unknown';
            html += `<tr><td>${imgHtml}</td><td><strong>${post.name}</strong></td><td>${post.age || 'N/A'}</td><td>${post.gender || 'N/A'}</td><td>${post.last_seen_location}</td><td><a href="mailto:${posterEmail}" class="email-link">📧 ${posterEmail}</a></td><td>${date}</td><td><button class="btn-delete" onclick="deleteMissingPost('${post.id}', '${post.name}')">Delete</button></td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) { container.innerHTML = `<div class="error">❌ ${err.message}</div>`; }
}

// Load Sightings
async function loadSightings() {
    const token = localStorage.getItem('authToken');
    const container = document.getElementById('foundContainer');
    try {
        const res = await fetch(`${API_URL}/admin/sightings-full`, { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        if (!res.ok) throw new Error('Failed to load sightings');
        const sightings = await res.json();
        
        document.getElementById('totalSightings').textContent = sightings.length;
        
        if (sightings.length === 0) { container.innerHTML = '<div class="loading">No sighting reports</div>'; return; }
        
        let html = `<table><thead><tr><th>Photo</th><th>Person Name</th><th>Location</th><th>Time</th><th>Contact</th><th>Reported By</th><th>Date</th><th>Action</th></tr></thead><tbody>`;
        sightings.forEach(s => {
            const photoUrl = s.photo_url || null;
            const imgHtml = photoUrl 
                ? `<img src="${photoUrl}" class="thumb-img" onclick="openImageModal('${photoUrl}')" alt="Sighting">` 
                : `<div class="no-photo"></div>`;
            const date = new Date(s.created_at).toLocaleDateString('en-KE');
            const phone = s.reporter_contact || 'N/A';
            const reporterEmail = s.reporter_email || 'Unknown';
            html += `<tr><td>${imgHtml}</td><td><strong>${s.missing_person_name || 'Unknown'}</strong></td><td>${s.sighting_location}</td><td>${s.sighting_time || 'N/A'}</td><td><span class="phone-number">📞 ${phone}</span></td><td><a href="mailto:${reporterEmail}" class="email-link">📧 ${reporterEmail}</a></td><td>${date}</td><td><button class="btn-delete" onclick="deleteSighting('${s.id}')">Delete</button></td></tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    } catch (err) { container.innerHTML = `<div class="error">❌ ${err.message}</div>`; }
}

// Delete Missing Post
async function deleteMissingPost(id, name) {
    if (!confirm(`Are you sure you want to delete the missing person report for "${name}"? This cannot be undone.`)) return;
    
    const token = localStorage.getItem('authToken');
    try {
        const res = await fetch(`${API_URL}/missing-persons/${id}`, {
            method: 'DELETE',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ reason: 'Admin deletion' })
        });
        
        if (!res.ok) throw new Error('Failed to delete');
        alert('✅ Post deleted successfully');
        loadMissingPersons(); 
    } catch (err) {
        alert('❌ Failed to delete: ' + err.message);
    }
}

// Delete Sighting
async function deleteSighting(id) {
    if (!confirm('Are you sure you want to delete this sighting report? This cannot be undone.')) return;
    
    const token = localStorage.getItem('authToken');
    try {
        const res = await fetch(`${API_URL}/sightings/${id}`, {
            method: 'DELETE',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ reason: 'Admin deletion' })
        });
        
        if (!res.ok) throw new Error('Failed to delete');
        alert('✅ Sighting deleted successfully');
        loadSightings(); 
    } catch (err) {
        alert('❌ Failed to delete: ' + err.message);
    }
}

// Initialize
window.addEventListener('load', () => {
    loadUsers();
    loadMissingPersons();
    loadSightings();
});
</script>

</body>
</html>
